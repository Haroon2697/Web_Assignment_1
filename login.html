<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Admin | Login</title>
    <script>
      tailwind = { config: { darkMode: "class" } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen auth-shell flex items-center justify-center px-4 py-8">
    <section class="w-full max-w-5xl auth-card bg-white grid md:grid-cols-2">
      <div class="auth-panel p-10 md:p-12 flex flex-col justify-center">
        <p class="uppercase text-xs tracking-[0.2em] text-indigo-100">Nova Admin</p>
        <h1 class="text-4xl font-extrabold mt-5 leading-tight">Welcome back to your premium dashboard</h1>
        <p class="mt-4 text-indigo-100">
          Control users, products, and analytics in one secure admin experience.
        </p>
      </div>
      <form id="loginForm" class="p-8 md:p-12 bg-white flex flex-col justify-center">
        <h2 class="text-2xl font-bold text-zinc-800">User Login</h2>
        <p class="text-zinc-500 mt-2">Please enter your credentials.</p>
        <div class="mt-6 space-y-4">
          <div>
            <label class="text-sm font-medium text-zinc-700">Email</label>
            <input id="email" type="email" class="w-full mt-1 px-4 py-2 rounded-xl border border-zinc-300" />
          </div>
          <div>
            <label class="text-sm font-medium text-zinc-700">Password</label>
            <input id="password" type="password" class="w-full mt-1 px-4 py-2 rounded-xl border border-zinc-300" />
          </div>
        </div>
        <div class="mt-3 flex items-center justify-between text-xs text-zinc-500">
          <label class="flex items-center gap-2"><input type="checkbox" /> Remember me</label>
          <span>Forgot password?</span>
        </div>
        <p id="errorMessage" class="mt-3 text-sm text-red-500"></p>
        <button class="w-full mt-4 bg-indigo-600 text-white py-2.5 rounded-xl hover:bg-indigo-700 transition-all">Login</button>
        <p class="text-sm mt-4 text-zinc-600">No account? <a href="signup.html" class="text-indigo-600 font-semibold">Signup</a></p>
        <a href="index.html" class="text-sm text-zinc-500 hover:text-indigo-600 mt-2 inline-block">Back to landing</a>
      </form>
    </section>
    <script type="module" src="assets/js/login.js"></script>
  </body>
</html>
