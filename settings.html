<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Admin | Settings</title>
    <script>tailwind = { config: { darkMode: "class" } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-zinc-100 dark:bg-zinc-900">
    <div class="page-shell lg:flex relative">
      <div id="sidebarBackdrop" class="sidebar-backdrop hidden lg:hidden" aria-hidden="true"></div>
      <aside id="appSidebar" class="app-sidebar lg:w-64 lg:min-h-screen glass dash-sidebar border-r p-6 flex flex-col">
        <div class="flex items-center justify-between gap-3 mb-6 md:mb-8 shrink-0">
          <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight min-w-0">Nova Admin</h2>
          <button type="button" class="sidebar-close-btn lg:hidden" aria-label="Close menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        <nav class="space-y-1 flex-1">
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="dashboard.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            Dashboard
          </a>
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="users.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Users
          </a>
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="products.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Products
          </a>
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="analytics.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Analytics
          </a>
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="notifications.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            Notifications
          </a>
          <a class="sidebar-link block px-4 py-2.5 rounded-xl" href="settings.html">
            <svg class="w-5 h-5 opacity-80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Settings
          </a>
        </nav>
      </aside>
      <main class="page-main flex-1 space-y-6">
        <header class="glass page-topbar p-4 border flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex items-start gap-3 min-w-0">
            <button type="button" id="sidebarToggle" class="lg:hidden shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-xl border border-[color:var(--surface-border)] bg-[color:var(--surface)] text-[color:var(--text)]" aria-label="Open navigation menu" aria-expanded="false">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="page-title-wrap min-w-0">
              <h1 class="section-title text-2xl sm:text-3xl">Settings</h1>
              <p class="section-subtitle mt-1">Manage your account details, credentials, and theme.</p>
            </div>
          </div>
          <div class="relative shrink-0 self-end sm:self-auto">
            <button id="profileButton" type="button" class="px-4 py-2 rounded-xl text-white">Profile</button>
            <div id="profileMenu" class="hidden absolute right-0 top-full mt-2 w-56 rounded-2xl p-2 z-50 bg-[color:var(--surface)] border border-[color:var(--surface-border)] shadow-xl">
              <div class="px-3 py-2.5 border-b border-[color:var(--surface-border)] mb-1.5">
                <p class="text-[0.65rem] font-bold uppercase tracking-wider text-[color:var(--muted-light)]">Signed in as</p>
                <p id="userEmail" class="text-sm font-medium truncate text-[color:var(--text)]"></p>
              </div>
              <button data-action="logout" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10 text-red-600 dark:text-red-400 font-medium">Logout</button>
            </div>
          </div>
        </header>
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 settings-grid">
          <form id="settingsForm" class="premium-card settings-panel p-5 space-y-4">
            <div class="settings-card-head">
              <div class="settings-card-icon" aria-hidden="true">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1118.364 4.56M15 11a3 3 0 11-6 0 3 3 0 016 0zM5.5 19.5a7.5 7.5 0 0113 0"></path></svg>
              </div>
              <div>
                <h3 class="section-title text-xl">Profile</h3>
                <p class="settings-chip">Account</p>
              </div>
            </div>
            <p class="section-subtitle">Update your basic account information.</p>
            <div>
              <label class="text-xs font-semibold text-[color:var(--muted)]" for="profileName">Name</label>
              <input id="profileName" required placeholder="Name" class="mt-1 w-full px-4 py-2 rounded-xl" />
            </div>
            <div>
              <label class="text-xs font-semibold text-[color:var(--muted)]" for="profileEmail">Email</label>
              <input id="profileEmail" required type="email" placeholder="Email" class="mt-1 w-full px-4 py-2 rounded-xl" />
            </div>
            <label class="settings-toggle-row">
              <input id="themeToggle" type="checkbox" class="h-5 w-5 accent-teal-500" />
              <span class="text-[color:var(--muted)]">Enable dark mode</span>
            </label>
            <button type="submit" class="px-4 py-2 rounded-xl bg-indigo-600 text-white font-semibold">Save profile</button>
          </form>
          <form id="passwordForm" class="premium-card settings-panel p-5 space-y-4">
            <div class="settings-card-head">
              <div class="settings-card-icon" aria-hidden="true">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c-1.1 0-2 .9-2 2v2h4v-2c0-1.1-.9-2-2-2zm6 4V9a6 6 0 10-12 0v6H4v4h16v-4h-2z"></path></svg>
              </div>
              <div>
                <h3 class="section-title text-xl">Password</h3>
                <p class="settings-chip">Security</p>
              </div>
            </div>
            <p class="section-subtitle">Updates the password you use on the login page (stored in localStorage).</p>
            <div>
              <label class="text-xs font-semibold text-[color:var(--muted)]" for="currentPassword">Current password</label>
              <input id="currentPassword" type="password" required autocomplete="current-password" placeholder="Current password" class="mt-1 w-full px-4 py-2 rounded-xl" />
            </div>
            <div>
              <label class="text-xs font-semibold text-[color:var(--muted)]" for="newPassword">New password</label>
              <input id="newPassword" type="password" required autocomplete="new-password" placeholder="New password" class="mt-1 w-full px-4 py-2 rounded-xl" />
            </div>
            <div>
              <label class="text-xs font-semibold text-[color:var(--muted)]" for="confirmNewPassword">Confirm new password</label>
              <input id="confirmNewPassword" type="password" required autocomplete="new-password" placeholder="Confirm new password" class="mt-1 w-full px-4 py-2 rounded-xl" />
            </div>
            <button type="submit" class="px-4 py-2 rounded-xl bg-indigo-600 text-white font-semibold">Update password</button>
          </form>
          <p id="settingsMessage" class="text-sm text-emerald-600 dark:text-emerald-400 lg:col-span-2 px-1" role="status"></p>
        </section>
      </main>
    </div>
    <script type="module" src="assets/js/settings.js"></script>
  </body>
</html>
